<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dashboard - Electro DZ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh}
nav{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.07);position:sticky;top:0;z-index:100}
.logo{color:#facc15;font-weight:800;font-size:1.05rem;text-decoration:none}
.nav-r{display:flex;align-items:center;gap:12px}
.nav-u{color:#94a3b8;font-size:.82rem}
.btn-out{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.28);color:#fca5a5;font-size:.78rem;font-weight:600;padding:6px 14px;border-radius:8px;cursor:pointer;transition:all .2s}
.hero{background:linear-gradient(135deg,#0f172a,#1e293b,#162216);padding:40px 28px 32px;border-bottom:1px solid rgba(255,255,255,.07)}
.inner{max-width:920px;margin:0 auto}
.badge{display:inline-flex;align-items:center;gap:7px;background:rgba(250,204,21,.09);border:1px solid rgba(250,204,21,.22);color:#facc15;font-size:.73rem;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;padding:4px 12px;border-radius:50px;margin-bottom:14px}
h1{font-size:clamp(1.3rem,2.5vw,1.8rem);font-weight:800;margin-bottom:6px}
h1 span{color:#facc15}
.sub{color:#64748b;font-size:.87rem;margin-bottom:20px}
.stats{display:flex;gap:12px;flex-wrap:wrap}
.stat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:10px}
.stat-i{font-size:1.3rem}
.stat-v{color:#f1f5f9;font-size:1rem;font-weight:800}
.stat-l{color:#64748b;font-size:.72rem}
.content{max-width:920px;margin:0 auto;padding:32px 28px 60px}
.sec-lab{display:flex;align-items:center;gap:12px;margin:28px 0 14px}
.sec-lab span{color:#facc15;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1.8px}
.sec-lab::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}
.search{position:relative;margin-bottom:20px}
.search input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:10px;color:#f1f5f9;font-size:.88rem;padding:11px 15px 11px 40px;outline:none}
.search input:focus{border-color:#facc15}
.search-i{position:absolute;left:12px;top:12px;color:#64748b}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.file{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:16px;transition:all .2s;cursor:pointer}
.file:hover{border-color:rgba(250,204,21,.3);background:rgba(255,255,255,.04)}
.file-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.file-i{font-size:1.5rem;flex-shrink:0}
.file-info{flex:1}
.file-name{color:#f1f5f9;font-size:.88rem;font-weight:600;margin-bottom:3px}
.file-meta{color:#64748b;font-size:.72rem}
.file-act{display:flex;gap:8px;margin-top:10px}
.file-btn{background:rgba(250,204,21,.1);border:1px solid rgba(250,204,21,.25);color:#facc15;font-size:.75rem;font-weight:600;padding:5px 12px;border-radius:6px;cursor:pointer;transition:all .2s}
.file-btn:hover{background:rgba(250,204,21,.15)}
.msg{padding:12px 15px;border-radius:9px;font-size:.83rem;margin-bottom:14px;display:none;line-height:1.5}
.msg.i{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);color:#93c5fd}
.msg.e{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.28);color:#fca5a5}
.msg.s{background:rgba(34,197,94,.09);border:1px solid rgba(34,197,94,.28);color:#86efac}
footer{text-align:center;padding:20px;color:#334155;font-size:.75rem;border-top:1px solid rgba(255,255,255,.05)}
</style>
</head>
<body>
<nav>
    <a href="index.html" class="logo" style="font-size:0.9rem;font-weight:800;letter-spacing:1px;line-height:1.2;">ELECTRO DZ CH<br><span style="font-size:0.45rem;letter-spacing:2px;font-weight:300;">ELECTROTECHNIQUE</span></a>  <div class="nav-r">
    <span class="nav-u" id="user"></span>
    <button class="btn-out" id="out">Deconnexion</button>
  </div>
</nav>
<div class="hero">
  <div class="inner">
    <div class="badge">&#128100; Espace membre</div>
    <h1>Bienvenue <span id="name"></span></h1>
    <p class="sub">Telechargez vos videos et documents exclusifs</p>
    <div class="stats">
      <div class="stat"><span class="stat-i">&#127916;</span><div><div class="stat-v" id="vid">0</div><div class="stat-l">Videos</div></div></div>
      <div class="stat"><span class="stat-i">&#128196;</span><div><div class="stat-v" id="doc">0</div><div class="stat-l">Documents</div></div></div>
      <div class="stat"><span class="stat-i">&#128230;</span><div><div class="stat-v" id="tot">0</div><div class="stat-l">Total</div></div></div>
    </div>
  </div>
</div>
<div class="content">
  <div class="msg i" id="msg">&#128640; Chargement des fichiers...</div>
  <div class="sec-lab"><span>Contenus disponibles</span></div>
  <div class="search">
    <span class="search-i">&#128269;</span>
    <input type="text" id="srch" placeholder="Rechercher un fichier..."/>
  </div>
  <div class="grid" id="grid"></div>
</div>
<footer>&copy; 2026 Electro DZ - <a href="privacy.html" style="color:#475569;text-decoration:none">Confidentialite</a></footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL='https://wxiqqcnzcxswdqzubxyt.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4aXFxY256Y3hzd2RxenVieHl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ0NTQ5NzcsImV4cCI6MjA2MDAzMDk3N30.YFkBDCmHIcTmjRJrYWuMbbfQgQkRIFa6PoLtl7Ml1UE';
const sb=supabase.createClient(SB_URL,SB_KEY);
const msg=(t,c)=>{const e=document.getElementById('msg');e.innerHTML=t;e.className='msg '+c;e.style.display='block';};
const icons={'video/mp4':'&#127916;','application/pdf':'&#128196;'};
  if(!session){location.href='login.html';return;}
  const name=(session.user.user_metadata?.full_name||session.user.email).split('@')[0];
  document.getElementById('name').textContent=name;
  document.getElementById('user').textContent=session.user.email;
  msg('Chargement...','i');
  const{data,error}=await sb.storage.from('media').list();
  if(error){msg('Erreur de chargement: '+error.message,'e');return;}
  if(!data||data.length===0){msg('Aucun fichier disponible pour le moment.','i');return;}
  files=data.filter(f=>f.name!=='.emptyFolderPlaceholder');
  if(files.length===0){msg('Aucun fichier disponible.','i');return;}
  renderFiles(files);
  document.getElementById('vid').textContent=files.filter(f=>f.metadata?.mimetype?.includes('video')).length;
  document.getElementById('doc').textContent=files.filter(f=>f.metadata?.mimetype?.includes('pdf')).length;
  document.getElementById('tot').textContent=files.length;
  document.getElementById('msg').style.display='none';
});
function renderFiles(list){
  const g=document.getElementById('grid');
  g.innerHTML=list.map(f=>{
    const type=f.metadata?.mimetype||'';
    const icon=icons[type]||'&#128462;';
    const size=((f.metadata?.size||0)/1024/1024).toFixed(1)+'MB';
    return `<div class="file">
      <div class="file-top">
        <span class="file-i">${icon}</span>
        <div class="file-info">
          <div class="file-name">${f.name}</div>
          <div class="file-meta">${size}</div>
        </div>
      </div>
      <div class="file-act">
        <button class="file-btn" onclick="dl('${f.name}')">&#8595; Telecharger</button>
      </div>
    </div>`;
  }).join('');
}
function dl(name){
  sb.storage.from('media').download(name).then(({data,error})=>{
    if(error){msg('Erreur: '+error.message,'e');return;}
    const url=URL.createObjectURL(data);
    const a=document.createElement('a');
    a.href=url;a.download=name;a.click();
    URL.revokeObjectURL(url);
  });
}
document.getElementById('srch').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase();
  const f=files.filter(x=>x.name.toLowerCase().includes(q));
  renderFiles(f);
});
document.getElementById('out').addEventListener('click',async()=>{
  await sb.auth.signOut();
  location.href='login.html';
});
</script>
</body>
</html>
